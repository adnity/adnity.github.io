            // We inject the CSS strictly via JS so we can destroy it without a trace.
            const styleString = "body { background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; } .box { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; color: white; width: 100%; max-width: 350px; box-sizing: border-box; } input { padding: 14px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; font-size: 18px; text-align: center; width: 100%; box-sizing: border-box; } button { background: #3b82f6; color: white; border: none; padding: 14px 20px; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; box-sizing: border-box; }";
            
            function applyAuthStyles() {
                const styleDiv = document.getElementById('auth-styles');
                if (styleDiv && styleDiv.innerHTML === '') {
                    styleDiv.innerHTML = '<style id="auth-css">' + styleString + '</style>';
                }
            }

            function removeAuthStyles() {
                const cssNode = document.getElementById('auth-css');
                if (cssNode) cssNode.remove();
                document.body.removeAttribute("style");
                document.documentElement.removeAttribute("style");
            }
            
            function performUnlock(pwd) {
                try {
                    const bytes = CryptoJS.AES.decrypt(encrypted, pwd);
                    const decoded = bytes.toString(CryptoJS.enc.Utf8);
                    if (!decoded) throw new Error("Bad password");
                    
                    sessionStorage.setItem('olx_dashboard_pin', pwd);
                    
                    // We must nuke our temporary CSS before injecting the real app
                    removeAuthStyles();
                    
                    document.open();
                    
                    const currentUrl = window.location.href.split('?')[0].split('#')[0];
                    const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
                    
                    let finalHtml = decoded;
                    if (finalHtml.includes('<head>')) {
                        finalHtml = finalHtml.replace('<head>', '<head><base href="' + baseUrl + '">');
                    } else {
                        finalHtml = '<base href="' + baseUrl + '">' + finalHtml;
                    }

                    document.write(finalHtml);
                    document.close();

                } catch(e) {
                    sessionStorage.removeItem('olx_dashboard_pin');
                    applyAuthStyles();
                    const box = document.getElementById('box');
                    const error = document.getElementById('error');
                    const pwdField = document.getElementById('pwd');
                    if(box) box.style.display = 'block';
                    if(error) error.style.display = 'block';
                    if(pwdField) { pwdField.value = ''; pwdField.focus(); }
                }
            }

            function init() {
                const savedPin = sessionStorage.getItem('olx_dashboard_pin');
                if (savedPin) {
                    // Try to unlock silently without ever applying auth styles
                    const box = document.getElementById('box');
                    if(box) box.style.display = 'none';
                    performUnlock(savedPin);
                } else {
                    applyAuthStyles();
                    const box = document.getElementById('box');
                    if(box) box.style.display = 'block';
                }
            }

            const btn = document.getElementById('btn');
            const pwdField = document.getElementById('pwd');
            if(btn && pwdField) {
                btn.onclick = () => performUnlock(pwdField.value);
                pwdField.addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') performUnlock(pwdField.value);
                });
            }

            if (typeof CryptoJS !== 'undefined') {
                init();
            } else {
                window.addEventListener('load', init);
            }
        })();
