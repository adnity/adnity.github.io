<title>Secured Area</title>
<style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: #1f2937; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
    h2 { margin-top: 0; color: #f3f4f6; }
    input { padding: 12px; border-radius: 6px; border: 1px solid #4b5563; background: #374151; color: white; margin-bottom: 15px; font-size: 16px; outline: none; text-align: center; width: 220px; transition: border-color 0.2s; }
    input:focus { border-color: #3b82f6; }
    button { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; width: 246px; transition: background 0.2s; }
    button:hover { background: #2563eb; }
    .error { color: #ef4444; margin-top: 15px; display: none; font-size: 14px; font-weight: bold; }
</style>
</head>

        <div id="error" class="error">Incorrect PIN!</div>

        function performUnlock(pwd) {
            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, pwd);
                const decoded = bytes.toString(CryptoJS.enc.Utf8);
                if (!decoded) throw new Error("Bad password");
                
                // Zapisz prawidłowe hasło w sesji przeglądarki
                sessionStorage.setItem('olx_dashboard_pin', pwd);
                
                // Przebuduj stronę odszyfrowanym kodem
                document.open();
                document.write(decoded);
                document.close();
            } catch(e) {
                // Usuń błędne hasło jeśli było zapisane
                sessionStorage.removeItem('olx_dashboard_pin');
                
                document.getElementById('box').style.display = 'block';
                document.getElementById('error').style.display = 'block';
                document.getElementById('pwd').value = '';
                document.getElementById('pwd').focus();
            }
        }

        // Sprawdź czy mamy już hasło w sesji (gdy użytkownik przełącza zakładki)
        const savedPin = sessionStorage.getItem('olx_dashboard_pin');
        if (savedPin) {
            // Ukryj okienko logowania na czas sprawdzania (żeby nie mrygało)
            document.getElementById('box').style.display = 'none';
            performUnlock(savedPin);
        } else {
            // Pokaż okienko jeśli nie ma sesji
            document.getElementById('box').style.display = 'block';
        }

        document.getElementById('btn').onclick = () => performUnlock(document.getElementById('pwd').value);
        document.getElementById('pwd').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') performUnlock(document.getElementById('pwd').value);
        });
