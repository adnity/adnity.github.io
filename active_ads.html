                    document.open();
                    
                    const currentUrl = window.location.href.split('?')[0].split('#')[0];
                    const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
                    
                    let finalHtml = decoded;
                    if (finalHtml.includes('<head>')) {
                        finalHtml = finalHtml.replace('<head>', '<head><base href="' + baseUrl + '">');
                    } else {
                        finalHtml = '<base href="' + baseUrl + '">' + finalHtml;
                    }

                    document.write(finalHtml);
                    document.close();

                } catch(e) {
                    sessionStorage.removeItem('olx_dashboard_pin');
                    applyAuthStyles();
                    const box = document.getElementById('box');
                    const error = document.getElementById('error');
                    const pwdField = document.getElementById('pwd');
                    if(box) box.style.display = 'block';
                    if(error) error.style.display = 'block';
                    if(pwdField) { pwdField.value = ''; pwdField.focus(); }
                }
            }

            function init() {
                const savedPin = sessionStorage.getItem('olx_dashboard_pin');
                if (savedPin) {
                    // Try to unlock silently without ever applying auth styles
                    const box = document.getElementById('box');
                    if(box) box.style.display = 'none';
                    performUnlock(savedPin);
                } else {
                    applyAuthStyles();
                    const box = document.getElementById('box');
                    if(box) box.style.display = 'block';
                }
            }

            const btn = document.getElementById('btn');
            const pwdField = document.getElementById('pwd');
            if(btn && pwdField) {
                btn.onclick = () => performUnlock(pwdField.value);
                pwdField.addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') performUnlock(pwdField.value);
                });
            }

            if (typeof CryptoJS !== 'undefined') {
                init();
            } else {
                window.addEventListener('load', init);
            }
        })();
    </script>
</body>
</html>
